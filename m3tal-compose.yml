services:
  m3tal-dashboard:
    image: ghcr.io/jakej985-rgb/m3tal-godash:debug
    container_name: m3tal-dashboard
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - ${CONFIG_PATH:-/mnt/config}/m3tal/state:/docker/state
      - ${BASE_STORAGE_PATH:-/mnt}:/mnt
      - ./users.json:/docker/state/users.json:rw
    command: python3 server.py
    restart: unless-stopped
    environment:
      - TZ=America/Denver
      - DASHBOARD_SECRET=${DASHBOARD_SECRET:-}
      - STATE_DIR=/docker/state
      - USERS_FILE=/docker/state/users.json
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8082
      - PYTHONUNBUFFERED=1
      - GO_API_URL=http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`dash.${DOMAIN:-}`)" # Updated rule as per plan
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8082"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=control-plane"
    networks:
      - proxy
    env_file:
      - ./m3tal.env
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 250M

networks:
  proxy:
    external: true
  default:
    name: none
