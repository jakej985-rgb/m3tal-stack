services:
  m3tal-dashboard:
    image: ghcr.io/jakej985-rgb/m3tal-godash:debug
    container_name: m3tal-dashboard
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - /mnt/config/m3tal/state:/docker/state
      - /mnt:/mnt
      - ./users.json:/docker/state/users.json:rw
    command: python3 server.py
    restart: unless-stopped
    # Running as non-root appuser (configured in Dockerfile)
    environment:
      - TZ=America/Denver
      - DASHBOARD_SECRET=${DASHBOARD_SECRET:?DASHBOARD_SECRET not set — run from repo root with .env}
      - STATE_DIR=/docker/state
      - USERS_FILE=/docker/state/users.json
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8082
      - PYTHONUNBUFFERED=1
      - GO_API_URL=http://host.docker.internal:5050
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`m3tal.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.services.dashboard.loadbalancer.server.port=8082"
      - "traefik.docker.network=m3tal"
      - "m3tal.stack=control-plane"
    networks:
      - m3tal
    env_file:
      - ../m3tal-core/.env
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 250M

  # Security Hardening: Docker Socket Proxy (Audit Fix 5)
  # This prevents the m3tal-runtime from having raw RW access to the host socket.
  docker-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: m3tal-docker-proxy
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - SERVICES=1
      - TASKS=1
      - EVENTS=1
      - VERSION=1
      - INFO=1
      - POST=1        # Allow restarts/reconciliation
      - EXEC=0        # Explicitly deny exec for proxy isolation
      - ALLOW_START=1
      - ALLOW_STOP=0
      - ALLOW_RESTARTS=1
    ports:
      - "127.0.0.1:2375:2375"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - m3tal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 100M
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:2375/version || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  m3tal-api:
    build:
      context: ../..
      dockerfile: cmd/api/Dockerfile
    container_name: m3tal-api
    user: "${PUID:-1000}:${PGID:-1000}"
    depends_on:
      m3tal-core:
        condition: service_started
    network_mode: host
    extra_hosts:
      - "m3tal-docker-proxy:127.0.0.1"
    volumes:
      - /mnt/config/m3tal/state:/docker/state
      - /mnt:/mnt
    environment:
      - TZ=America/Denver
      - STATE_DIR=/docker/state
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 50M

  m3tal-core:
    build: 
      context: ../..
      dockerfile: cmd/m3tal/Dockerfile
    container_name: m3tal-core
    network_mode: host
    volumes:
      - /mnt/config/m3tal/state:/docker/state
      - /sys:/sys:ro
      - /proc:/proc:ro
      - /usr/bin/radeontop:/usr/bin/radeontop:ro
      - /usr/sbin/smartctl:/usr/sbin/smartctl:ro
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /:/host:ro
      - /mnt:/mnt
    devices:
      - /dev/dri:/dev/dri
    privileged: true
    pid: host
    cap_add:
      - SYS_RAWIO
    environment:
      - TZ=America/Denver
      - DOCKER_HOST=tcp://m3tal-docker-proxy:2375
      - STATE_DIR=/docker/state
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 100M

networks:
  m3tal:
    external: true
  default:
    name: none
