services:

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    # Security: No raw socket. Talk to proxy.
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock
    command:
      - "--label-enable"
      - "--cleanup"
      - "--interval"
      - "600"
    environment:
      - TZ=America/Denver
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.41}
      - DOCKER_HOST=tcp://m3tal-docker-proxy:2375
    networks:
      - proxy
    env_file:
      - ../../.env
    labels:
      - "m3tal.stack=maintenance"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 150M


  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    restart: unless-stopped
    # Security: No raw socket. Talk to proxy.
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_HOST=tcp://m3tal-docker-proxy:2375
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.41}
    volumes:
      - /mnt/config/portainer:/data
      - /mnt:/mnt
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.portainer.entrypoints=web"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=maintenance"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 300M
    networks:
      - proxy
    env_file:
      - ../../.env

networks:
  proxy:
    external: true
  default:
    name: none
