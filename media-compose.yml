x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent
    container_name: qbittorrent
    network_mode: "container:gluetun"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - WEBUI_PORT=8090
      - WEBUI_IP_ADDRESS=0.0.0.0
      - TORRENTING_PORT=6881
    volumes:
      - /mnt/config/qbittorrent:/config
      - /mnt:/mnt
    env_file:
      - ./media.env
    labels:
      - "m3tal.stack=media"
      - "m3tal.role=vpn"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1500M
    restart: unless-stopped

  komga:
    image: gotson/komga
    container_name: komga
    user: "${PUID:-1000}:${PGID:-1000}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:25600/actuator/health"]
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - /mnt/config/komga:/config
      - /mnt:/mnt
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.komga.rule=Host(`komga.${DOMAIN:-}`)"
      - "traefik.http.routers.komga.entrypoints=web"
      - "traefik.http.services.komga.loadbalancer.server.port=25600"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ./media.env
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 600M
    restart: unless-stopped

  jellyseerr:
    image: fallenbagel/jellyseerr
    container_name: jellyseerr
    user: "${PUID:-1000}:${PGID:-1000}"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5055"]
      interval: 60s
      timeout: 10s
      retries: 3
    volumes:
      - /mnt/config/jellyseerr:/app/config
      - /mnt:/mnt
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.${DOMAIN:-}`)"
      - "traefik.http.routers.jellyseerr.entrypoints=web"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"
      - "traefik.docker.network=proxy"
      - "m3tal.stack=media"
      - "m3tal.role=internal"
    networks:
      - proxy
    env_file:
      - ./media.env
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 300M
    restart: unless-stopped

networks:
  proxy:
    external: true
  default:
    name: none

# Transitioned to bind mounts for self-healing permission management
