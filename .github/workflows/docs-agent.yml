name: M3tal Self-Documenting System

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🧰 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: |
          npm install js-yaml @google/generative-ai fs-extra

      - name: 🔍 [1] Parse System State (Source of Truth)
        run: |
          node .github/scripts/parse-docker.js
          node .github/scripts/parse-env.js
          node .github/scripts/parse-m3tal.js

      - name: 🧱 [2] Assemble Deterministic README
        run: |
          node .github/scripts/build-readme.js

      - name: 🧠 [3] AI Polish (Gemini)
        env:
          GOOGLE_AI_KEY: ${{ secrets.GOOGLE_AI_KEY }}
        run: |
          node .github/scripts/docsmith.js

      - name: 🧪 [4] AI QA Gate (DocCritic)
        env:
          GOOGLE_AI_KEY: ${{ secrets.GOOGLE_AI_KEY }}
        run: |
          node .github/scripts/doccritic.js

      - name: 📝 Commit Documentation Changes
        if: github.event_name == 'push'
        run: |
          git config user.name "m3tal-docs-bot"
          git config user.email "actions@github.com"

          # Always add the fixes report
          if [[ -f FIXES.md ]]; then
            git add FIXES.md
          fi

          # Only push README if it passed the DocCritic check
          if [[ ! -f .doc-failed ]]; then
            if [[ `git status --porcelain README.md` ]]; then
              git add README.md
              git commit -m "docs: auto-update from system state [skip ci]" || true
            fi
          else
            echo "[!] DocCritic BLOCKERS found. Skipping README update, but pushing FIXES.md."
            git commit -m "docs: update audit report (blockers detected) [skip ci]" || true
          fi

          git push
