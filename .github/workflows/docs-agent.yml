name: M3tal Component Docs

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🧰 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: |
          npm install js-yaml @google/generative-ai fs-extra

      - name: 🔍 [1] Parse Infrastructure State
        run: |
          node .github/scripts/parse-docker.js

      - name: 🧱 [2] Assemble README
        run: |
          node .github/scripts/build-readme.js

      - name: 🧠 [3] AI Polish (Gemini)
        env:
          GOOGLE_AI_KEY: ${{ secrets.GOOGLE_AI_KEY }}
        run: |
          node .github/scripts/docsmith.js

      - name: 🧪 [4] AI QA Gate (DocCritic)
        env:
          GOOGLE_AI_KEY: ${{ secrets.GOOGLE_AI_KEY }}
        run: |
          node .github/scripts/doccritic.js

      - name: 📝 Commit Documentation
        if: github.event_name == 'push'
        run: |
          git config user.name "m3tal-docs-bot"
          git config user.email "actions@github.com"

          if [[ `git status --porcelain README.md` ]]; then
            git add README.md
            git commit -m "docs: auto-update [skip ci]"
            git push
          fi
