
services:
  traefik:
    image: traefik:latest
    container_name: traefik
    command:
      - "--api.dashboard=true"
      - "--ping=true"
      - "--entrypoints.traefik.address=:8080"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=m3tal"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # No ACME/Let's Encrypt — Cloudflare Tunnel handles TLS termination.
      # Internal traffic: cloudflared → Traefik is plain HTTP within the Docker network.
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "443:443"
      - "127.0.0.1:8081:8080"
    environment:
      - DOCKER_API_VERSION=1.45
      - DOMAIN=${DOMAIN}
      - DOCKER_HOST=tcp://m3tal-docker-proxy:2375
    env_file:
      - ../../.env
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    volumes:
      - /mnt/config/traefik/dynamic:/etc/traefik/dynamic:ro
      - /mnt:/mnt
    networks:
      - m3tal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 250M
    labels:
      - "traefik.enable=true"
      # Public Secure Router (Requires Auth)
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.routers.traefik.middlewares=m3tal-auth"
      # Stealth Internal Router (No Auth, Internal Only)
      - "traefik.http.routers.traefik-internal.rule=Host(`traefik-api.internal`)"
      - "traefik.http.routers.traefik-internal.service=api@internal"
      - "traefik.http.routers.traefik-internal.entrypoints=web"
      
      - "traefik.http.middlewares.m3tal-auth.basicauth.usersfile=/etc/traefik/dynamic/users"
      - "m3tal.stack=routing"
      - "m3tal.role=gateway"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN:?CF_TUNNEL_TOKEN not set — run from repo root with .env}
    networks:
      - m3tal
    env_file:
      - ../../.env
    labels:
      - "m3tal.stack=routing"
      - "m3tal.role=edge"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 150M
    restart: unless-stopped

networks:
  m3tal:
    external: true
  default:
    name: none
