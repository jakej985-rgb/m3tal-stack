services:
  traefik:
    image: traefik:latest
    container_name: traefik
    # No command flags — using /etc/traefik/traefik.yml
    ports:
      - "127.0.0.1:8081:8080" # Traefik Dashboard (Local only)
    environment:
      - DOCKER_API_VERSION=1.45
      - DOMAIN=${DOMAIN}
      - DOCKER_HOST=tcp://m3tal-docker-proxy:2375
    env_file:
      - ../../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ${CONFIG_PATH:-/mnt/config}/traefik/dynamic:/etc/traefik/dynamic:ro
      - ./dynamic/api.yml:/etc/traefik/dynamic/api.yml:ro
      - ${BASE_STORAGE_PATH:-/mnt}:/mnt
    networks:
      - proxy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 250M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN:?DOMAIN not set}`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.routers.traefik.middlewares=m3tal-auth"
      - "traefik.http.middlewares.m3tal-auth.basicauth.usersfile=/etc/traefik/dynamic/users"
      - "m3tal.stack=routing"
      - "m3tal.role=gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN:?CF_TUNNEL_TOKEN not set — run from repo root with .env}
    networks:
      - proxy
    env_file:
      - ../../.env
    labels:
      - "m3tal.stack=routing"
      - "m3tal.role=edge"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 150M
    restart: unless-stopped

networks:
  proxy:
    external: true
  default:
    name: none
